# SAM deployment configuration
# Fill in the values below, then run: ./deploy.sh

version = 0.1

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
stack_name          = "care360-cloud"
region              = "ap-southeast-2"        # change to your AWS region
capabilities        = "CAPABILITY_IAM"
confirm_changeset   = false
resolve_s3          = true                    # SAM auto-creates an S3 bucket

# Override these via environment variables or edit directly:
parameter_overrides = [
  "NotificationEmail=community@example.com",  # <-- replace
  "NotificationPhone=+8613082028672",           # <-- replace or leave blank
]
